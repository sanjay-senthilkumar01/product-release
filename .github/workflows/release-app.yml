name: Build and Release App

on:
  push:
    tags:
      - 'v*' # Triggers on semantic versioning tags like v1.0.0
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64] # Intel and Apple Silicon

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Native Dependencies
        run: npm install

      - name: Build React Extensions
        run: npm run buildreact

      - name: Build macOS Application
        run: npm run gulp vscode-darwin-${{ matrix.arch }}-min
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Zip the Application
        run: |
          cd ..
          zip -r NeuralInverse-darwin-${{ matrix.arch }}.zip VSCode-darwin-${{ matrix.arch }}/NeuralInverse.app
          mv NeuralInverse-darwin-${{ matrix.arch }}.zip $GITHUB_WORKSPACE/

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeuralInverse-mac-${{ matrix.arch }}
          path: NeuralInverse-darwin-${{ matrix.arch }}.zip
          retention-days: 7


  build-windows:
    name: Build Windows
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Native Dependencies
        run: npm install

      - name: Build React Extensions
        run: npm run buildreact

      - name: Build Windows Installer
        run: npm run gulp vscode-win32-${{ matrix.arch }}-user-setup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeuralInverse-win-${{ matrix.arch }}
          path: ..\VSCode-win32-${{ matrix.arch }}\*.exe
          retention-days: 7


  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential dpkg-dev rpm jq libx11-dev libxkbfile-dev libsecret-1-dev fakeroot

      - name: Install Native Dependencies
        run: npm install

      - name: Build React Extensions
        run: npm run buildreact

      - name: Build Linux Deb & RPM
        run: |
          npm run gulp vscode-linux-${{ matrix.arch }}-build-deb
          npm run gulp vscode-linux-${{ matrix.arch }}-build-rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NeuralInverse-linux-${{ matrix.arch }}
          path: |
            ../.build/linux/deb/**/*.deb
            ../.build/linux/rpm/**/*.rpm
          retention-days: 7


  release:
    name: Create GitHub Release
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Display structure of downloaded files
        run: ls -R artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
